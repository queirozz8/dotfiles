source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

# ── Vesper palette ──────────────────────────────
# Cores inspiradas no Vesper theme do raunofreiberg
$v_white  = rgba(232, 227, 218, 1.0)   # off-white quente
$v_orange = rgba(255, 199, 153, 1.0)   # laranja Vesper
$v_muted  = rgba(102, 102, 102, 1.0)   # cinza escuro, pra info secundária
$v_subtle = rgba(60, 60, 60, 1.0)      # quase invisível, pra detalhes mínimos
$v_dark = rgba(30, 28, 26, 1.0)   # quase preto, tom quente

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

# ── Background ──────────────────────────────────
background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current
    color = rgb(10, 10, 10)
    blur_size = 3
    blur_passes = 1          # era 2, reduzido 1 nível
    noise = 0.0117
    contrast = 1.3
    brightness = 0.75
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ── Data ────────────────────────────────────────
# update:18000000 = atualiza a cada 5h (o suficiente pra uma data)
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%A, %-d %B')"
    color = $v_muted
    font_size = 16
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, 195
    halign = center
    valign = center
}

# ── Relógio 24h ─────────────────────────────────
# update:1000 = atualiza a cada 1 segundo
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $v_white
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 60
    halign = center
    valign = center
}

# ── Clima: só ícone + temperatura ───────────────
# Roda o Weather.py, pega só o campo "text" do JSON (ex: "  22°C")
label {
    monitor =
    text = cmd[update:3600000] python3 $HOME/.config/hypr/UserScripts/Weather.py 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('text','') + '  ·  ' + d.get('alt',''))"
    color = $v_dark
    font_size = 15
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, -90
    halign = center
    valign = center
}

# ── Usuário ─────────────────────────────────────
label {
    monitor =
    text = $USER
    color = $v_orange
    font_size = 16
    font_family = JetBrainsMono Nerd Font SemiBold
    position = 0, 235
    halign = center
    valign = bottom
}

# ── Input de senha ──────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(255, 199, 153, 0.5)    # borda laranja Vesper, semi-transparente
    inner_color = rgba(10, 10, 10, 0.85)      # fundo quase preto
    capslock_color = $v_white
    font_color = $v_white
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Medium
    placeholder_text = <span foreground="##66666699">password</span>
    hide_input = false
    rounding = 4
    position = 0, 170
    halign = center
    valign = bottom
}

# ── Uptime ──────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(uptime -p)"
    color = $v_subtle
    font_size = 11
    font_family = JetBrainsMono Nerd Font Medium
    position = -20, 20
    halign = right
    valign = bottom
}